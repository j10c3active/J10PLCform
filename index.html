<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLC Weekly Report</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 950px;
    margin: auto;
    background: white;
    padding: 20px;
}

h1, h2 {
    text-align: center;
}

.section {
    margin-top: 20px;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

textarea {
    min-height: 90px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: none;
    border-radius: 10px;
    background: #2e7d32;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1b5e20;
}

.note {
    font-size: 12px;
    color: #666;
}

/* PRINT FIX */
@media print {
    button,
    .note {
        display: none !important;
    }

    body {
        background: white !important;
    }

    .container {
        box-shadow: none !important;
        border: none !important;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>PLC WEEKLY REPORT</h1>

<!-- SUBJECT -->
<div class="section">
<h2>Basic Information</h2>

<label>Subject</label>
<select>
    <option>Bahasa Melayu</option>
    <option>English</option>
    <option>Science</option>
    <option>Mathematics</option>
    <option>MIB</option>
    <option>Lukisan</option>
    <option>STEAM</option>
    <option>Pendidikan Agama Islam</option>
    <option>Pendidikan Pra Sekolah</option>
    <option>ICT</option>
    <option>Pendidikan Jasmani</option>
    <option>Social Studies</option>
</select>

<label>School</label>
<input type="text" value="SR. Perpindahan Kg. Lambak Kanan Jalan 10, Cluster 3" readonly>

<label>PLC Frequency</label>
<select>
    <option>Weekly on agreed selected day</option>
    <option>Every Monday</option>
    <option>Every Tuesday</option>
    <option>Every Wednesday</option>
    <option>Every Thursday</option>
    <option>Every Saturday</option>
    <option>Once</option>
    <option>Depends on schedule</option>
</select>

<label>Participants (Choose or Manual)</label>
<select>
    <option>Science Team</option>
    <option>English Team</option>
    <option>Bahasa Melayu Team</option>
    <option>Mathematics Team</option>
    <option>MIB Team</option>
    <option>ICT Team</option>
    <option>STEAM Team</option>
    <option>Lower Primary Teachers</option>
    <option>Upper Primary Teachers</option>
</select>

<input type="text" placeholder="OR type names manually if needed">

<label>PLC / PD Date</label>
<input type="date">

</div>

<!-- GENERIC SECTION TEMPLATE STYLE -->

<div class="section">
<h2>Focus Area</h2>
<select>
    <option>Concept understanding</option>
    <option>Science process skills</option>
    <option>Exam / SBA preparation</option>
    <option>Classroom engagement</option>
    <option>Differentiated learning</option>
    <option>HOTS development</option>
    <option>Practical / hands-on activities</option>
    <option>Vocabulary development</option>
</select>
<textarea placeholder="OR type manually if needed"></textarea>
</div>

<div class="section">
<h2>Identified Issues</h2>
<select>
    <option>Weak written explanations</option>
    <option>Limited vocabulary</option>
    <option>Low engagement</option>
    <option>Difficulty answering HOTS questions</option>
    <option>Misconceptions in concepts</option>
    <option>Gap between high and low achievers</option>
    <option>Time management issues</option>
</select>
<textarea placeholder="OR type manually if needed"></textarea>
</div>

<div class="section">
<h2>Discussion & Observation</h2>
<select>
    <option>Pupils engaged but still weak in writing</option>
    <option>Good participation in hands-on activities</option>
    <option>Mixed ability gap still visible</option>
    <option>Improvement in group discussion</option>
    <option>Need more scaffolding support</option>
</select>
<textarea placeholder="OR type manually if needed"></textarea>
</div>

<!-- PDCA -->

<div class="section">
<h2>PDCA - PLAN</h2>
<select>
    <option>Differentiated worksheets</option>
    <option>Hands-on activities</option>
    <option>Sentence starters / scaffolding</option>
    <option>Group work activities</option>
    <option>Revision drills</option>
</select>
<textarea></textarea>
</div>

<div class="section">
<h2>PDCA - DO</h2>
<select>
    <option>Conducted experiments</option>
    <option>Group discussions</option>
    <option>Quiz activities</option>
    <option>Presentations</option>
    <option>Worksheet practice</option>
</select>
<textarea></textarea>
</div>

<div class="section">
<h2>PDCA - CHECK</h2>
<select>
    <option>Improved engagement observed</option>
    <option>Still weak in written responses</option>
    <option>Better understanding shown</option>
    <option>Mixed results across classes</option>
</select>
<textarea></textarea>
</div>

<div class="section">
<h2>PDCA - ACT</h2>
<select>
    <option>Increase scaffolding support</option>
    <option>Refine teaching materials</option>
    <option>More guided practice needed</option>
    <option>Continue current approach with improvement</option>
</select>
<textarea></textarea>
</div>

<div class="section">
<h2>Reflection (Auto Generated)</h2>
<button onclick="generateReflection()">Generate Reflection</button>
<textarea id="reflectionBox" placeholder="Reflection will appear here..."></textarea>
</div>

<button onclick="window.print()">Save as PDF / Download</button>

<p class="note">
Tip: On iPhone/Android, tap this button → Print → Save as PDF
</p>

</div>

<script>
function generateReflection() {
    let subject = document.querySelector("select").value;

    let plan = document.querySelectorAll("select")[2].value;
    let doVal = document.querySelectorAll("select")[3].value;
    let check = document.querySelectorAll("select")[4].value;
    let act = document.querySelectorAll("select")[5].value;

    let text =
`Reflection for ${subject} PLC:

The team focused on ${plan}. During implementation, ${doVal}. The outcome showed that ${check}. As a way forward, we will ${act}. This PLC session helped improve collaboration and provided clear direction for next steps in teaching and learning.`;

    document.getElementById("reflectionBox").value = text;
}
</script>

</body>
</html>
