<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLC Weekly Report</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
}

.container {
    max-width: 950px;
    margin: auto;
    background: white;
    padding: 20px;
}

h1, h2 {
    text-align: center;
}

.section {
    margin-top: 20px;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 10px;
}

label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

textarea {
    min-height: 90px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: none;
    border-radius: 10px;
    background: #2e7d32;
    color: white;
    font-size: 16px;
}

.note {
    font-size: 12px;
    color: #666;
}

@media print {
    button, .note {
        display: none !important;
    }
}
</style>
</head>

<body>

<div class="container">
<h1>PLC WEEKLY REPORT</h1>

<div class="section">
<h2>Basic Information</h2>

<label>Subject</label>
<select id="subject">
<option>Bahasa Melayu</option>
<option>English</option>
<option>Science</option>
<option>Mathematics</option>
<option>MIB</option>
<option>Lukisan</option>
<option>STEAM</option>
<option>Pendidikan Agama Islam</option>
<option>Pendidikan Pra Sekolah</option>
<option>ICT</option>
<option>Pendidikan Jasmani</option>
<option>Social Studies</option>
</select>

<label>School</label>
<input type="text" value="SR. Perpindahan Kg. Lambak Kanan Jalan 10, Cluster 3" readonly>

<label>PLC Frequency</label>
<select>
<option>Weekly on agreed selected day</option>
<option>Every Monday</option>
<option>Every Tuesday</option>
<option>Every Wednesday</option>
<option>Every Thursday</option>
<option>Every Saturday</option>
<option>Once</option>
<option>Depends on schedule</option>
</select>

<label>Participants</label>
<select>
<option>Science Team</option>
<option>English Team</option>
<option>Bahasa Melayu Team</option>
<option>Mathematics Team</option>
<option>MIB Team</option>
<option>Lukisan Team</option>
<option>STEAM Team</option>
<option>Pendidikan Agama Islam Team</option>
<option>ICT Team</option>
<option>Pendidikan Jasmani Team</option>
<option>Social Studies Team</option>
</select>

<input type="text" placeholder="Or enter names manually">

<label>PLC Date</label>
<input type="date">

</div>

<!-- FUNCTION TEMPLATE -->
<script>
function getValue(selectId, textId) {
    let select = document.getElementById(selectId).value;
    let text = document.getElementById(textId).value;
    return text ? text : select;
}
</script>

<!-- FOCUS -->
<div class="section">
<h2>Focus Area</h2>
<select id="focus">
<option>Concept understanding</option>
<option>Exam preparation</option>
<option>HOTS development</option>
<option>Student engagement</option>
<option>Differentiation</option>
</select>
<textarea id="focusText"></textarea>
</div>

<!-- ISSUES -->
<div class="section">
<h2>Identified Issues</h2>
<select id="issues">
<option>Weak explanation</option>
<option>Low engagement</option>
<option>Limited vocabulary</option>
<option>HOTS difficulty</option>
<option>Achievement gap</option>
</select>
<textarea id="issuesText"></textarea>
</div>

<!-- DISCUSSION -->
<div class="section">
<h2>Discussion & Observation</h2>
<select id="discussion">
<option>Students engaged but weak writing</option>
<option>Good participation observed</option>
<option>Mixed ability gap evident</option>
<option>Need more scaffolding</option>
</select>
<textarea id="discussionText"></textarea>
</div>

<!-- PDCA -->
<div class="section">
<h2>PLAN</h2>
<select id="plan">
<option>Differentiated tasks</option>
<option>Hands-on activities</option>
<option>Scaffolding techniques</option>
</select>
<textarea id="planText"></textarea>
</div>

<div class="section">
<h2>DO</h2>
<select id="do">
<option>Group work</option>
<option>Experiments</option>
<option>Quiz activities</option>
</select>
<textarea id="doText"></textarea>
</div>

<div class="section">
<h2>CHECK</h2>
<select id="check">
<option>Improved engagement</option>
<option>Better understanding</option>
<option>Still weak responses</option>
</select>
<textarea id="checkText"></textarea>
</div>

<div class="section">
<h2>ACT</h2>
<select id="act">
<option>Improve scaffolding</option>
<option>Refine teaching</option>
<option>More practice</option>
</select>
<textarea id="actText"></textarea>
</div>

<!-- REFLECTION -->
<div class="section">
<h2>Reflection</h2>

<select onchange="toggleReflection(this.value)">
<option value="manual">Manual</option>
<option value="auto">Auto Generate</option>
</select>

<div id="manualReflection">
<textarea placeholder="Write reflection here..."></textarea>
</div>

<div id="autoReflection" style="display:none;">
<button onclick="generateReflection()">Generate Reflection</button>
<textarea id="reflectionBox"></textarea>
</div>

</div>

<button onclick="window.print()">Save as PDF / Download</button>

<p class="note">Use Print → Save as PDF</p>

</div>

<script>
function toggleReflection(mode){
document.getElementById("manualReflection").style.display = mode==="manual"?"block":"none";
document.getElementById("autoReflection").style.display = mode==="auto"?"block":"none";
}

function generateReflection(){
let subject=document.getElementById("subject").value;
let focus=getValue("focus","focusText");
let issues=getValue("issues","issuesText");
let discussion=getValue("discussion","discussionText");
let plan=getValue("plan","planText");
let doVal=getValue("do","doText");
let check=getValue("check","checkText");
let act=getValue("act","actText");

let text=`During this PLC session, the ${subject} team focused on ${focus}, addressing ${issues}. Observations indicated that ${discussion}.

Strategies such as ${plan} were implemented through ${doVal}. The results showed that ${check}, demonstrating improvement in pupil engagement and understanding. However, further support is required for some pupils.

Moving forward, the team will ${act}, with emphasis on differentiation, scaffolding, and targeted questioning to enhance learning outcomes.`;

document.getElementById("reflectionBox").value=text;
}
</script>

</body>
</html>
